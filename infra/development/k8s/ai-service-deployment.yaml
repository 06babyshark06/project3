apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: JQKStudy/ai-service
          ports:
            - containerPort: 9005
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: AI_GRPC_ADDR
              value: ":9005"
            - name: GEMINI_API_KEY
              value: "AIzaSyBzG1zFxIfoEBaCkNZ0Q0Z8feODqE-q60Q"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
spec:
  clusterIP: None
  selector:
    app: ai-service
  ports:
    - port: 9005
      protocol: TCP
      name: grpc
      targetPort: 9005
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
